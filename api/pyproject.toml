[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "company-brain-api"
version = "0.1.0"
description = "Company Brain API — RAG multimodal com Gemma 4 E2B, harrier-oss embeddings e ChromaDB"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }

dependencies = [
    # Web
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "python-multipart>=0.0.9",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",

    # RAG / orquestração
    "llama-index-core>=0.12",
    "llama-index-embeddings-huggingface>=0.4",
    "llama-index-vector-stores-chroma>=0.4",

    # Vector DB
    "chromadb>=0.5",

    # Modelos (Gemma 4 E2B + harrier embeddings) via Hugging Face
    "transformers>=4.57",
    "torch>=2.3",
    "torchvision>=0.18",
    "accelerate>=0.33",
    "sentence-transformers>=3.0",
    "huggingface-hub>=0.25",

    # Multimodal: áudio (STT) e parse de documentos/imagens
    "librosa>=0.10",
    "soundfile>=0.12",
    "pillow>=10.3",
    "pypdf>=4.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "ruff>=0.5",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"
